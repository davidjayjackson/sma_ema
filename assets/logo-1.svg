<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512" role="img" aria-label="sma_ema logo">
  <defs>
    <linearGradient id="bg1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f2027"/>
      <stop offset="0.5" stop-color="#203a43"/>
      <stop offset="1" stop-color="#2c5364"/>
    </linearGradient>
    <linearGradient id="ema1" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ffd166"/>
      <stop offset="1" stop-color="#ff7b54"/>
    </linearGradient>
  </defs>

  <!-- rounded badge -->
  <rect x="16" y="16" width="480" height="480" rx="96" fill="url(#bg1)"/>

  <!-- baseline grid -->
  <g stroke="#3c6e7a" stroke-width="2" opacity="0.5">
    <line x1="80" y1="160" x2="432" y2="160"/>
    <line x1="80" y1="256" x2="432" y2="256"/>
    <line x1="80" y1="352" x2="432" y2="352"/>
  </g>

  <!-- price candles (raw data) -->
  <g fill="#7fd1e0" opacity="0.55">
    <rect x="96"  y="300" width="20" height="70" rx="6"/>
    <rect x="150" y="250" width="20" height="120" rx="6"/>
    <rect x="204" y="280" width="20" height="90" rx="6"/>
    <rect x="258" y="200" width="20" height="170" rx="6"/>
    <rect x="312" y="240" width="20" height="130" rx="6"/>
    <rect x="366" y="180" width="20" height="190" rx="6"/>
  </g>

  <!-- SMA: smooth steady line -->
  <path d="M96 320 C 160 300, 220 285, 268 250 S 380 210, 406 195"
        fill="none" stroke="#ffffff" stroke-width="12" stroke-linecap="round" opacity="0.9"/>

  <!-- EMA: faster, weighted line -->
  <path d="M96 340 C 150 250, 210 300, 268 215 S 360 240, 406 165"
        fill="none" stroke="url(#ema1)" stroke-width="12" stroke-linecap="round"/>

  <!-- wordmark -->
  <text x="256" y="452" text-anchor="middle"
        font-family="Segoe UI, Helvetica, Arial, sans-serif"
        font-size="56" font-weight="700" letter-spacing="2" fill="#eaf6f6">
    SMA<tspan fill="#ff9a5a">·</tspan>EMA
  </text>
</svg>
