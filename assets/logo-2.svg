<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512" role="img" aria-label="sma_ema logo">
  <defs>
    <linearGradient id="stroke2" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0" stop-color="#4f46e5"/>
      <stop offset="1" stop-color="#06b6d4"/>
    </linearGradient>
  </defs>

  <!-- light card -->
  <rect x="16" y="16" width="480" height="480" rx="72" fill="#f7fafc" stroke="#e2e8f0" stroke-width="4"/>

  <!-- circular "average window" motif -->
  <circle cx="256" cy="236" r="150" fill="none" stroke="#e2e8f0" stroke-width="20"/>
  <circle cx="256" cy="236" r="150" fill="none" stroke="url(#stroke2)" stroke-width="20"
          stroke-linecap="round" stroke-dasharray="710 942"
          transform="rotate(-90 256 236)"/>

  <!-- moving-average wave inside the window -->
  <path d="M150 270 C 188 230, 212 300, 256 236 S 324 170, 362 220"
        fill="none" stroke="#0f172a" stroke-width="14" stroke-linecap="round"/>
  <!-- data dots -->
  <g fill="#06b6d4">
    <circle cx="150" cy="270" r="11"/>
    <circle cx="256" cy="236" r="11"/>
    <circle cx="362" cy="220" r="11"/>
  </g>
  <circle cx="203" cy="252" r="8" fill="#4f46e5"/>
  <circle cx="309" cy="206" r="8" fill="#4f46e5"/>

  <!-- wordmark -->
  <text x="256" y="446" text-anchor="middle"
        font-family="Segoe UI, Helvetica, Arial, sans-serif"
        font-size="64" font-weight="800" letter-spacing="1" fill="#0f172a">
    movavg
  </text>
</svg>
